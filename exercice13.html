<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1><u>formulaire de contact professionnel</u></h1>

    <form action="">
        <label for="name">nom:</label>
        <input  class="disabled" type="text" name="name" id="name" placeholder="name"><br><br>
        <label for="adresse">adresse email:</label>
        <input type="email" name="adresse" id="adresse" placeholder=" electronical adresse" ><br><br>
        <label for="tel">numero de telephone:</label>
        <input type="tel" name="numtel" id="numtel" placeholder="phone number"><br><br>
        <label for="entreprise">entreprise:</label>
        <input type="text" name="entreprise" id="entreprise" placeholder="company"><br><br>
        <label for="objet">objet du message:</label>
        <select name="objet" id="objet">
            <option value="saluer" class="disabled">saluer</option>
            <option value="service" class="disabled">demande de service</option>
            <option value="pret" class="disabled">demande de pret</option>
            <option value="renseignement" class="disabled">demande de renseignement</option>
            <option value="" class="disabled">declaration d'amour</option>
        </select>
        <br><br>
        <label for="message">message</label><br>
        <textarea name="message" id="message" placeholder="saisir votre message ici..." rows="5" cols="50"></textarea>
        <br><br>
        <label for="">niveau d'urgence:</label>
        <input type="radio" name="urgence" id="normal">
        <label for="normal">normal</label><input type="radio" name="urgence" id="urgent"><label for="urgent">urgent</label><input type="radio" name="urgence" id="trèsurgent"><label for="trèsurgent">très urgent</label>
        <br><br>
        <label for="">préférence de contact:</label>
        <input type="checkbox" name="preference" id="mail">
        <label for="mail">envoi de mail</label><input type="checkbox" name="preference" id="mess"><label for="mess">envoi de sms</label>
        <br><br>
        
        <label for="fichier">envoyer un fichier :</label>

        <input type="file" name="" id="fichier"><br><br>
        <label for="rappel">date souhaitée pour rappel:</label>
        <input type="date" name="" id="rappel">
        <br><br>
        <label for="disponibilite">heures de disponibilités:</label>
        <input type="time" name="" id="disponibilite">
        
    </form>
